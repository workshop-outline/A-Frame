



<!DOCTYPE html>
<html>
  <head>
    <title>Textures - A-Frame School</title>
    <meta name="description" content="Textures - A-Frame School">
    
    
    
    <script src="https://aframe.io/releases/0.5.0/aframe.min.js"></script>
    
    
    <script>
  AFRAME.registerComponent('scale-on-mouseenter', {
    // ...
  });
</script>
    
    <script src="https://rawgit.com/mayognaise/aframe-gif-shader/master/dist/aframe-gif-shader.min.js"></script>

    
    
  </head>
  <body>
    
    
    
    <a-scene>
      
      
      <a-entity position="0 2 -4" rotation="0 25 0" geometry="primitive:box;" material="shader:gif;src:url(https://media0.giphy.com/media/xT9IgsOaEG15pWz17y/giphy.gif)"></a-entity>
     

<a-box color="#FFF" width="2" height="2" depth="2"
       position="-10 5 8" rotation="0 0 45" scale="2 2 2"
       src="#boxTexture">
  
  
  <a-animation attribute="position" to="0 3.2 -10" direction="alternate" dur="2000"
    repeat="indefinite"></a-animation>
  
  <!-- These animations will start when the box is looked at. -->
  <a-animation attribute="scale" begin="mouseenter" dur="300" to="2.3 2.3 2.3"></a-animation>
  <a-animation attribute="scale" begin="mouseleave" dur="300" to="2 2 2"></a-animation>
  <a-animation attribute="rotation" begin="click" dur="2000" to="360 405 45"></a-animation>
</a-box>     
      
      <a-sphere src="https://raw.githubusercontent.com/aframevr/sample-assets/master/assets/images/bricks/brick_diffuse.jpg" 
                radius="2.5" position="7 5 -3"></a-sphere>
    
      
      <a-cone src="#phi-length" height="20" radius-top="6.1" position="0 5 -14"></a-cone>

      
<a-plane src="#groundTexture" rotation="-90 0 0" width="30" height="30"
  repeat="10 10"></a-plane>

      <a-light type="ambient" color="#445451"></a-light>
      <a-light type="point" intensity="2" position="2 4 4"></a-light>

    
      <a-sky src="#skyTexture"></a-sky>
      
      
 
  <!-- ... -->
  <a-box src="#box2" position="0 2 -5" rotation="0 45 45" scale="2 2 2"
         scale-on-mouseenter="to: 2.2 2.2 2.2">
    
    
    <a-animation attribute="position" to="0 8.2 -5" direction="alternate" dur="2000"
      repeat="indefinite"></a-animation>
  </a-box>
  <!-- ... -->

       <a-camera position="0 1 14">
      
    <a-cursor></a-cursor>
      
  </a-camera>
      
      

  
  <a-assets>
    <img id="boxTexture" src="https://raw.githubusercontent.com/aframevr/sample-assets/master/assets/images/illustration/758px-Canestra_di_frutta_(Caravaggio).jpg">
    
    
        <img id="box2" src="https://raw.githubusercontent.com/aframevr/sample-assets/master/assets/images/noise/water.jpg">

    
    <img id="phi-length" src="https://raw.githubusercontent.com/aframevr/sample-assets/master/assets/images/noise/perlin-512.png">

    
    <img id="skyTexture"
      src="https://cdn.aframe.io/360-image-gallery-boilerplate/img/sechelt.jpg">
    
      <img id="groundTexture" src="https://cdn.aframe.io/a-painter/images/floor.jpg">
    

    
     <a-sound src="https://cdn.aframe.io/basic-guide/audio/backgroundnoise.wav" autoplay="true"
    position="-3 1 -4"></a-sound>
    
    
  </a-assets>
    


      

    </a-scene>

    
    
  </body>
</html>
