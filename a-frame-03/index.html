
<html>

<head>
  
<script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>

<script src="https://unpkg.com/aframe-environment-component"></script>
	  
	 
</head>

   
<body>
      
    <a-entity id="world"></a-entity>
    
<a-scene environment="preset:yavapai" physics="debug: true; gravity: 0.8; restitution:0.7">
<a-box position="-1 5.5 -30" height="100" rotation="360 -45 360" color="#4CC3D9" animation="property: rotation; to: 0 -360 0; loop: true; dur: 100000"></a-box>
<a-sphere position="-19 20 -120" radius="10" color="#EF2D5E" animation="property: position; to: 180 90 360; loop: true; dur: 100000"></a-sphere>
<a-cylinder position="-10 10 -3" radius="2" height="10.5" color="#FFC65D" animation="property: rotation; to: 360 -360 360; loop: true; dur: 100000"></a-cylinder>

    <a-sky color="#ECECEC"></a-sky>
  
  
<a-text mixin="text" position="130 145 -90" wrap-count="20" 
        
animation="property: rotation; to: 360 -360 360; loop: true; dur: 100000">
      
</a-text>
  
      
      
<a-assets>
        
<a-mixin id="text" text="align: center; width: 500; value: 
                                 
How beautiful the universe
What little we can see
The shimmering stars
The silver moon
The timeless melody.

Are we goldfish in a bowl
Doomed eternally
To swim around our little world
And think it is the sea?
And that we are the masters?”
                
― Bernie Morris, Verse for Ages">
        
</a-mixin>
        

        
<video id="penguin-sledding" controls autoplay loop="true" src="https://cdn.glitch.global/2707c624-2c44-4ff3-a665-ef7bec0fd451/integral_over_the_body.mp4?v=1700235401765"></video>
  
  
</a-assets>
      
      
 
<a-entity id="elmo" geometry="primitive: box" material="src: elmo.png"
          sound="src: url(https://cdn.glitch.global/61191102-5a12-4b04-aef7-2416adef1eb8/584903__kangaroovindaloo__magpie.wav?v=1677713459869); on: click loop"></a-entity>
      
      
        <a-entity cursor position="0 0 -5"></a-entity>

  <!-- Using the asset management system. -->
  <a-video src="https://cdn.glitch.global/2707c624-2c44-4ff3-a665-ef7bec0fd451/integral_over_the_body.mp4?v=1700235401765" width="50" height="24" position="-45 15 -20"></a-video>

  <!-- Defining the URL inline. Not recommended but more comfortable for web developers. -->
     
  
      
      
      
      <a-camera position="0 3.8 20"></a-camera>

      
    </a-scene>
    
  </body>
</html>
